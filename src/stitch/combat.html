<style>
        .pixel-border {
            border: 2px solid theme('colors.outline-variant');
            box-shadow: inset 0 0 0 1px theme('colors.surface-container-lowest'), 0 0 0 1px theme('colors.surface-container-lowest');
        }
        .pixel-border-gold {
            border: 2px solid theme('colors.secondary');
            box-shadow: inset 0 0 0 1px theme('colors.surface-container-lowest'), 0 0 0 1px theme('colors.surface-container-lowest');
        }
        .bar-glow-red { box-shadow: 0 0 10px rgba(139, 0, 0, 0.5); }
        .bar-glow-blue { box-shadow: 0 0 10px rgba(45, 219, 222, 0.5); }
        .bar-glow-green { box-shadow: 0 0 10px rgba(85, 107, 47, 0.5); }
        
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            50% { transform: translateX(2px); }
            75% { transform: translateX(-2px); }
            100% { transform: translateX(0); }
        }
        .health-low { animation: shake 0.5s infinite; }
        
        .crt-overlay {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

<body class="bg-background text-on-background h-screen w-screen overflow-hidden relative font-body-lg">
<!-- Gameplay Background (Simulated) -->
<div class="absolute inset-0 z-0 bg-surface-container-lowest" data-alt="A dark, oppressive 16-bit pixel art style cavern. The walls are jagged stone, illuminated only by faint, eerie blue glowing moss and distant, flickering torchlight. The atmosphere is grim, dusty, and dangerous, perfectly suited for a high-fantasy Metroidvania game world. Deep shadows conceal the depths of the cave." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAEcXGAVaYQUTa86-DMwx2Am64uZAIJle3MAGUoQlerzsHMj1p9u8DVjV8NfeTDNrM4-DvkVXeibhY9dqzgINSCCMPP_kr-8bVLKAC3sZBFk-UHwIZTyxavML6thSwu5xadtqS8sn2bgxJZhBdWvy8e5vU4nfia8QfvBGBSYzjGBaqAfMpwLA5pm3jMD5RnigO7vbRpS5eHVKk6dsSCsRbu9ETSnaMYeJV_cyyxsxRywanJujMfC-zIsSokH5RZX61Zc70fl7qWOzE6'); background-size: cover; background-position: center; filter: brightness(0.3) contrast(1.2);">

</div>
<!-- HUD Container -->
<div class="relative z-20 w-full h-full p-margin-edge flex flex-col justify-between pointer-events-none">
<!-- Top Row: Stats & Minimap -->
<div class="flex justify-between items-start w-full">
<!-- Top Left: Vitals Cluster -->
<div class="flex flex-col gap-2 w-64 pointer-events-auto">
<!-- Alignment Badge -->
<div class="flex items-center gap-2 bg-surface-container/80 pixel-border p-2 w-fit">
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">balance</span>
<span class="font-label-caps text-label-caps text-secondary uppercase tracking-widest">Alignment: Neutral</span>
</div>
<!-- Health Bar -->
<div class="relative h-6 w-full pixel-border bg-surface-container-lowest overflow-hidden health-low group">
<div class="absolute inset-0 bg-primary-container w-[15%] bar-glow-red transition-all duration-300"></div>
<div class="absolute inset-y-0 right-0 w-1/2 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSJ0cmFuc3BhcmVudCI+PC9yZWN0Pgo8cGF0aCBkPSJNMCAwTDQgNFpNNCBMIDQgMFoiIHN0cm9rZT0iIzM1MzUzNSIgc3Ryb2tlLXdpZHRoPSIwLjUiPjwvcGF0aD4KPC9zdmc+')] opacity-50"></div>
<div class="absolute inset-0 flex items-center px-2">
<span class="font-label-caps text-label-caps text-on-primary-container drop-shadow-md">HP 120/800</span>
</div>
</div>
<!-- Mana Bar -->
<div class="relative h-4 w-5/6 pixel-border bg-surface-container-lowest overflow-hidden">
<div class="absolute inset-0 bg-tertiary-container w-[70%] bar-glow-blue transition-all duration-300"></div>
<div class="absolute inset-0 flex items-center px-2">
<span class="font-label-caps text-label-caps text-tertiary drop-shadow-md">MP 450/600</span>
</div>
</div>
<!-- Stamina Bar -->
<div class="relative h-3 w-4/6 pixel-border bg-surface-container-lowest overflow-hidden">
<div class="absolute inset-0 bg-outline w-[100%] bar-glow-green transition-all duration-300"></div>
</div>
</div>
<!-- Top Right: Minimap -->

<div class="w-full h-full bg-surface-container-lowest relative overflow-hidden" style="background-image: radial-gradient(circle at center, #1b1c1c 0%, #0e0e0e 100%);">

<div class="absolute top-3/4 left-2/3 w-3 h-3 bg-primary-container rounded-sm shadow-[0_0_5px_#8b0000]"></div> <!-- Enemy -->
</div>
<div class="absolute -bottom-6 right-0 font-label-caps text-label-caps text-secondary bg-surface-container-lowest px-2 py-1 pixel-border">
                    DEPTH: 4
                </div>

<div class="flex gap-2 bg-surface-container-lowest/80 p-2 pixel-border backdrop-blur-sm">

<div class="absolute inset-0 flex items-center justify-center">

<div class="absolute inset-0 bg-black/60 flex items-center justify-center">
<span class="font-body-sm text-error font-bold">2.5</span>
</div>
</div>
