<style>
        /* Custom Gothic Ornate Border and Glows */
        .gothic-border {
            border: 4px solid var(--tw-colors-outline-variant);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 0, 0, 0.6);
            position: relative;
        }
        .gothic-border::before, .gothic-border::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: var(--tw-colors-secondary);
            border-radius: 1px;
            box-shadow: 0 0 5px var(--tw-colors-secondary);
        }
        .gothic-border::before { top: -4px; left: -4px; }
        .gothic-border::after { bottom: -4px; right: -4px; }
        
        .gothic-border-inner::before, .gothic-border-inner::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: var(--tw-colors-secondary);
            border-radius: 1px;
            box-shadow: 0 0 5px var(--tw-colors-secondary);
        }
        .gothic-border-inner::before { top: -4px; right: -4px; }
        .gothic-border-inner::after { bottom: -4px; left: -4px; }

        .scanlines {
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            pointer-events: none;
        }

        .typewriter {
            overflow: hidden;
            border-right: .15em solid var(--tw-colors-primary);
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: var(--tw-colors-primary) }
        }

        .pop-up-anim {
            animation: floatUp 2s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(20px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(-10px); }
            100% { opacity: 0; transform: translateY(-30px); }
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface h-screen w-screen overflow-hidden flex flex-col justify-end relative font-body-lg">

<div class="absolute inset-0 bg-black/60 z-0 pointer-events-none scanlines"></div>
<!-- Main Game Viewport Placeholder (Behind Overlay) -->

<!-- Alignment Pop-up Effect -->
<div class="absolute bottom-[40%] right-margin-edge z-50 flex items-center gap-2 pop-up-anim">
<span class="material-symbols-outlined text-tertiary drop-shadow-[0_0_8px_rgba(45,219,222,0.8)]" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-headline-md text-headline-md text-tertiary drop-shadow-[0_0_8px_rgba(45,219,222,0.8)] uppercase tracking-wider">+10 Good Alignment Shift</span>
</div>
<!-- Dialogue Overlay Container -->
<div class="relative z-10 w-full max-w-5xl mx-auto mb-margin-edge px-margin-edge md:px-0">
<!-- The Dialogue Box -->
<div class="gothic-border bg-surface-container-high/95 backdrop-blur-md flex flex-col md:flex-row shadow-[0_10px_30px_rgba(0,0,0,0.8)] relative group">
<div class="gothic-border-inner absolute inset-0 pointer-events-none"></div>
<!-- Portrait Section -->
<div class="w-full md:w-48 h-48 md:h-auto border-b-4 md:border-b-0 md:border-r-4 border-outline-variant relative flex-shrink-0 bg-surface-container-lowest">

<!-- Inner glow for magical focus -->
<div class="absolute inset-0 shadow-[inset_0_0_20px_rgba(45,219,222,0.3)] pointer-events-none"></div>

<span class="font-headline-sm text-secondary uppercase tracking-widest text-sm font-bold shadow-black drop-shadow-md">Goddess of Light</span>
</div>
</div>
<!-- Text Content Section -->
<div class="flex-1 flex flex-col justify-between p-panel-padding md:p-6 relative">
<!-- Dialogue Text -->
<div class="mb-4 h-24 overflow-hidden relative">

<span class="material-symbols-outlined absolute -top-2 -left-2 text-outline/20 text-4xl pointer-events-none">format_quote</span>
<p class="font-headline-md text-headline-md text-on-surface-variant italic leading-relaxed z-10 relative typewriter inline-block text-shadow-sm">
                        "Your path is yours to carve, Wanderer."
                    </p>
</div>
<!-- Input / Action Area -->
<div class="mt-auto border-t-2 border-outline-variant/50 pt-4 relative">
<form class="flex items-center gap-4 relative" onsubmit="event.preventDefault();">

<div class="flex-1 relative">
<input class="w-full bg-surface-container-lowest border-2 border-outline-variant rounded-none px-4 py-3 font-body-lg text-body-lg text-primary focus:outline-none focus:border-tertiary focus:ring-1 focus:ring-tertiary transition-colors placeholder:text-on-surface-variant/50 shadow-inner" placeholder="Speak your truth..." type="text"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">edit</span>
</div>
<!-- Send Action -->
<button class="flex-shrink-0 bg-surface-container-lowest border-2 border-outline-variant hover:border-error hover:bg-surface-container-low text-on-surface px-6 py-3 font-label-caps text-label-caps uppercase tracking-widest transition-all duration-150 active:translate-y-px shadow-[2px_2px_0px_#5a403c] hover:shadow-[2px_2px_0px_#ffb4ab] group flex items-center gap-2" type="submit">
<span>Respond</span>
<span class="material-symbols-outlined text-sm group-hover:text-error transition-colors">send</span>
</button>
</form>
</div>
<!-- Decorative corner accents -->
<div class="absolute bottom-2 right-2 flex gap-1 pointer-events-none opacity-50">
<div class="w-1 h-1 bg-secondary rounded-full"></div>
<div class="w-1 h-1 bg-secondary rounded-full"></div>
<div class="w-1 h-1 bg-secondary rounded-full"></div>
</div>
</div>
</div>
